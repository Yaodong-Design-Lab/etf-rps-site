name: Daily ETF RPS Update

on:
  schedule:
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Target trade date, for example 2026-07-06. Leave empty to use Beijing today."
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas

      - name: Rebuild ETF RPS data
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python scripts/daily_update.py --date "${{ github.event.inputs.date }}"
          else
            python scripts/daily_update.py
          fi

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html payload.json reports data automation/etf_nav_daily_chart_universe_latest.csv automation/last_run.json
          if git diff --cached --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore: update ETF RPS daily data"
            git push
          fi
