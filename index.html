<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>今日 ETF RPS 观察</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --panel: #ffffff;
      --ink: #111827;
      --muted: #6b7280;
      --line: #dbe1ea;
      --red: #b91c1c;
      --hot: #f5a3b3;
    }
    * { box-sizing: border-box; }
    html {
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.45;
    }
    body { margin: 0; background: var(--bg); }
    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 26px 18px 40px;
    }
    .hero {
      padding: 20px 0 8px;
    }
    .eyebrow {
      color: var(--red);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
    }
    h1 {
      margin: 8px 0 10px;
      color: var(--ink);
      font-size: 34px;
      line-height: 1.08;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }
    .panel {
      margin-top: 18px;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel);
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    .panel-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      background: #eef3f8;
      padding: 14px 16px;
    }
    .panel-title {
      font-size: 20px;
      font-weight: 900;
    }
    .panel-date {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .latest {
      padding: 16px;
    }
    .summary {
      display: grid;
      gap: 10px;
      margin-bottom: 16px;
    }
    .summary-row {
      display: grid;
      grid-template-columns: 82px 1fr;
      gap: 10px;
      border-bottom: 1px solid #edf1f6;
      padding-bottom: 9px;
    }
    .summary-row span {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }
    .summary-row strong {
      color: var(--ink);
      font-size: 16px;
      font-weight: 900;
    }
    .primary-link {
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--ink);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      padding: 14px 16px;
      text-decoration: none;
    }
    .history-list {
      display: grid;
      gap: 8px;
      padding: 12px 16px 16px;
    }
    .history-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      border: 1px solid var(--line);
      border-radius: 10px;
      color: inherit;
      padding: 12px;
      text-decoration: none;
    }
    .history-item strong {
      font-size: 15px;
    }
    .history-item span {
      color: var(--muted);
      font-size: 12px;
    }
    footer {
      padding: 22px 0 0;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <div class="eyebrow">ETF RPS DAILY</div>
      <h1>今日 ETF RPS 观察</h1>
      <p class="subtitle" id="subtitle">读取最新日报...</p>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">最新日报</div>
        <div class="panel-date" id="latestDate">-</div>
      </div>
      <div class="latest">
        <div class="summary">
          <div class="summary-row"><span>最强方向</span><strong id="strongestDirection">-</strong></div>
          <div class="summary-row"><span>观察方向</span><strong id="watchDirections">-</strong></div>
          <div class="summary-row"><span>代表标的</span><strong id="topEtf">-</strong></div>
        </div>
        <a class="primary-link" id="latestLink" href="#">点击查看最新日报</a>
      </div>
    </section>

    <section class="panel">
      <div class="panel-head">
        <div class="panel-title">历史日报</div>
        <div class="panel-date">归档</div>
      </div>
      <div class="history-list" id="historyList"></div>
    </section>

    <footer>数据仅供观察，不构成投资建议。</footer>
  </main>

  <script>
    fetch("./data/latest.json")
      .then((response) => response.json())
      .then((data) => {
        document.querySelector("#subtitle").textContent = `交易日 ${data.date}`;
        document.querySelector("#latestDate").textContent = data.date;
        document.querySelector("#latestLink").href = data.latestReport.url;
        document.querySelector("#strongestDirection").textContent = data.latestReport.summary.strongestDirection;
        document.querySelector("#watchDirections").textContent = data.latestReport.summary.watchDirections.join(" / ");
        document.querySelector("#topEtf").textContent = data.latestReport.summary.topEtf;
        document.querySelector("#historyList").innerHTML = data.history.map((item) => `
          <a class="history-item" href="${item.url}">
            <strong>${item.title}</strong>
            <span>查看</span>
          </a>
        `).join("");
      })
      .catch(() => {
        document.querySelector("#subtitle").textContent = "日报数据读取失败";
      });
  </script>
</body>
</html>
