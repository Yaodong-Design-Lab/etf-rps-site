<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>今日 ETF RPS 观察</title>
  <style>
    :root {
      --bg: #f7f8fb;
      --ink: #111827;
      --muted: #6b7280;
      --line: #dbe1ea;
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }
    body {
      display: grid;
      min-height: 100vh;
      margin: 0;
      place-items: center;
      background: var(--bg);
    }
    main {
      width: min(100% - 36px, 520px);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      padding: 24px;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    a {
      display: inline-flex;
      margin-top: 18px;
      border-radius: 10px;
      background: var(--ink);
      color: #fff;
      font-weight: 800;
      padding: 12px 16px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <main>
    <h1>正在打开最新 ETF RPS 日报</h1>
    <p id="status">如果没有自动跳转，请点击下方按钮进入。</p>
    <a id="fallbackLink" href="./reports/daily_observation_full_2026-06-12.html">查看最新日报</a>
  </main>

  <script>
    const fallbackUrl = "./reports/daily_observation_full_2026-06-12.html";

    fetch("./data/latest.json", { cache: "no-store" })
      .then((response) => response.json())
      .then((data) => {
        const reportUrl = data && data.latestReport && data.latestReport.url
          ? data.latestReport.url
          : fallbackUrl;

        document.querySelector("#fallbackLink").href = reportUrl;
        window.location.replace(reportUrl);
      })
      .catch(() => {
        document.querySelector("#status").textContent = "自动读取最新日报失败，请点击下方按钮进入。";
      });
  </script>
</body>
</html>
